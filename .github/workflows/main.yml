name: Deploy to Server

on:
  push:
    branches:
      - master  # or your deployment branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /apps/Analytics_BE  # change this to your server's project path
          git pull
          # Step 1: Build image with a temp name
          docker build --no-cache -t Analytics_BE-Analytics_BE-temp .
          # Step 2: Stop and remove containers using old image
          docker ps -q --filter "ancestor=Analytics_BE" | xargs -r docker stop
          docker ps -aq --filter "ancestor=Analytics_BE" | xargs -r docker rm
          # Step 3: Remove old image
          docker rmi Analytics_BE-Analytics_BE || true
          # Step 4: Tag new image to old name
          docker tag Analytics_BE-Analytics_BE-temp Analytics_BE-Analytics_BE
          # Step 5: Remove temp image tag
          docker rmi Analytics_BE-Analytics_BE-temp
          # Step 6: Run container using renamed image
          docker-compose up -d
